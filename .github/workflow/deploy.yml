name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect & Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/skill-swap-platform
            git pull origin main
            docker build -t skillswap .
            docker stop skillswap-container || true
            docker rm skillswap-container || true
            docker run -d -p 8000:8000 --name skillswap-container skillswap
